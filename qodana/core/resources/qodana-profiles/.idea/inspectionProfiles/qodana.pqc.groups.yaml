# Post-Quantum Cryptography inspection groups.
#
# Rule ids are generated from pqc-opengrep-rule-generator (opengrep-rules/java-kotlin).

groups:
  - groupId: PqcLevelIndependentInspections  # PQC inspections not tied to a NIST level
    inspections:
      - CryptoProviderSpecification
      - SslParametersModification
      - SslParametersNonDefaultConstructors
      - KotlinCryptoProviderSpecification
      - KotlinSslParametersModification
      - KotlinSslParametersNonDefaultConstructors

  - groupId: PqcNotCompliantRules  # NIST "not compliant" (level 0)
    inspections:
      - JavaKotlinUsingCryptographySignatureEdDSA
      - JavaKotlinUsingCryptographySignatureEd25519
      - JavaKotlinUsingCryptographySignatureEd448
      - JavaKotlinUsingCryptographySignatureRSA
      - JavaKotlinUsingCryptographySignatureDSA
      - JavaKotlinUsingCryptographySignatureECDSA
      - JavaKotlinUsingCryptographyKeyAgreementDiffieHellman
      - JavaKotlinUsingCryptographyKEMDiffieHellman
      - JavaKotlinUsingCryptographyKeyAgreementECDH
      - JavaKotlinUsingCryptographyKeyAgreementECMQV
      - JavaKotlinUsingCryptographyKeyAgreementXDH
      - JavaKotlinUsingCryptographyKeyAgreementX25519
      - JavaKotlinUsingCryptographyKeyAgreementX448
      - JavaKotlinUsingCryptographyCipherArcfour
      - JavaKotlinUsingCryptographyCipherBlowfish
      - JavaKotlinUsingCryptographyCipherChaCha20
      - JavaKotlinUsingCryptographyCipherDES
      - JavaKotlinUsingCryptographyCipherTripleDES
      - JavaKotlinUsingCryptographyCipherECIES
      - JavaKotlinUsingCryptographyCipherRC2
      - JavaKotlinUsingCryptographyCipherRC4
      - JavaKotlinUsingCryptographyCipherRC5
      - JavaKotlinUsingCryptographyCipherRSA
      - JavaKotlinUsingCryptographyMacMD5
      - JavaKotlinUsingCryptographyMessageDigestMD2
      - JavaKotlinUsingCryptographyMessageDigestMD5
      - JavaKotlinUsingCryptographySSLContextSSL
      - JavaKotlinUsingCryptographySSLContextSSL2
      - JavaKotlinUsingCryptographySSLContextSSL3
      - JavaKotlinUsingCryptographySSLContextTLS1
      - JavaKotlinUsingCryptographySSLContextTLS11
      - JavaKotlinUsingCryptographySSLContextTLS12
      - JavaKotlinUsingCryptographySSLContextDTLS10
      - JavaKotlinUsingCryptographySSLContextDTLS12

  - groupId: PqcLevel1Rules  # NIST level 1
    inspections:
      - JavaKotlinUsingCryptographyKEMMLKEM512
      - JavaKotlinUsingCryptographyCipherAES128
      - JavaKotlinUsingCryptographyMacSHA1
      - JavaKotlinUsingCryptographyMessageDigestSHA1

  - groupId: PqcLevel2Rules  # NIST level 2
    inspections:
      - JavaKotlinUsingCryptographySignatureMLDSA44
      - JavaKotlinUsingCryptographyMessageDigestSHAKE128

  - groupId: PqcLevel3Rules  # NIST level 3
    inspections:
      - JavaKotlinUsingCryptographySignatureMLDSA65
      - JavaKotlinUsingCryptographyKEMMLKEM768
      - JavaKotlinUsingCryptographyCipherAES192
      - JavaKotlinUsingCryptographyMacSHA224
      - JavaKotlinUsingCryptographyMacSHA512224
      - JavaKotlinUsingCryptographyMacSHA3224
      - JavaKotlinUsingCryptographyMessageDigestSHA224
      - JavaKotlinUsingCryptographyMessageDigestSHA512224
      - JavaKotlinUsingCryptographyMessageDigestSHA3224

  - groupId: PqcLevel5Rules  # NIST level 5
    inspections:
      - JavaKotlinUsingCryptographySignatureMLDSA87
      - JavaKotlinUsingCryptographySignatureMLDSA
      - JavaKotlinUsingCryptographySignatureHSSLMSwithSHA256
      - JavaKotlinUsingCryptographyKEMMLKEM
      - JavaKotlinUsingCryptographyKEMMLKEM1024
      - JavaKotlinUsingCryptographyCipherAES256
      - JavaKotlinUsingCryptographyCipherAES
      - JavaKotlinUsingCryptographyMacSHA256
      - JavaKotlinUsingCryptographyKDFSHA256
      - JavaKotlinUsingCryptographyMacSHA512256
      - JavaKotlinUsingCryptographyMacSHA384
      - JavaKotlinUsingCryptographyKDFSHA384
      - JavaKotlinUsingCryptographyMacSHA512
      - JavaKotlinUsingCryptographyKDFSHA512
      - JavaKotlinUsingCryptographyMacSHA3256
      - JavaKotlinUsingCryptographyMacSHA3384
      - JavaKotlinUsingCryptographyMacSHA3512
      - JavaKotlinUsingCryptographyMessageDigestSHA256
      - JavaKotlinUsingCryptographyMessageDigestSHA384
      - JavaKotlinUsingCryptographyMessageDigestSHA512
      - JavaKotlinUsingCryptographyMessageDigestSHA512256
      - JavaKotlinUsingCryptographyMessageDigestSHA3256
      - JavaKotlinUsingCryptographyMessageDigestSHA3384
      - JavaKotlinUsingCryptographyMessageDigestSHA3512
      - JavaKotlinUsingCryptographyMessageDigestSHAKE256

  - groupId: PqcMinLevel1  # NIST level 1
    groups:
      - "PqcLevelIndependentInspections"
      - "PqcNotCompliantRules"

  - groupId: PqcMinLevel2  # NIST level 2
    groups:
      - "PqcMinLevel1"
      - "PqcLevel1Rules"

  - groupId: PqcMinLevel3  # NIST level 3
    groups:
      - "PqcMinLevel2"
      - "PqcLevel2Rules"

  - groupId: PqcMinLevel4  # NIST level 4
    groups:
      - "PqcMinLevel3"
      - "PqcLevel3Rules"

  - groupId: PqcMinLevel5  # NIST level 5
    groups:
      - "PqcMinLevel4"

  - groupId: AllPqcInspections  # every PQC inspection, any level
    groups:
      - "PqcMinLevel5"
      - "PqcLevel5Rules"
